allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
# Exempt the first-party toolchain from pnpm's minimumReleaseAge supply-chain
# gate (~24h). We deliberately track freshly-published @takazudo/* + create-zudo-doc
# releases, which are routinely newer than the cutoff. NOTE: the lockfile verify
# (`pnpm install --frozen-lockfile`, what CI runs) only honors NAME / glob patterns
# here — the `name@version` entries pnpm auto-adds are ignored by that pass, so use
# the scope glob instead.
minimumReleaseAgeExclude:
  - '@takazudo/*'
  - create-zudo-doc
