# Pull request quality checks and preview deployment.
#
# Triggered on PRs targeting `main`. The pipeline:
#   1. Type checking (astro check)
#   2. Build the Astro docs site
#   3. Deploy a preview to Cloudflare Pages
#   4. Post the preview URL as a PR comment
#
# Concurrency: cancel in-progress runs for the same PR to save resources.

name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Type checking
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checking
        run: pnpm check

  # ---------------------------------------------------------------------------
  # Job 2: Build the Astro docs site
  # ---------------------------------------------------------------------------
  build-site:
    name: Build Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          dest: ~/setup-pnpm-${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist-out
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Deploy preview and comment on PR
  # ---------------------------------------------------------------------------
  preview:
    name: Preview Deploy
    needs: [build-site]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist-out
          path: dist-out/

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/pj/zudo-test
          if [ -d dist-out/client ]; then
            cp -r dist-out/client/. deploy/pj/zudo-test/
          else
            cp -r dist-out/. deploy/pj/zudo-test/
          fi
          echo '/ /pj/zudo-test/ 302' > deploy/_redirects

      - name: Deploy preview to Cloudflare Pages
        id: cf-deploy
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          npx wrangler@4 pages deploy deploy \
            --project-name=zudo-test-wisdom \
            --branch="pr-${PR_NUMBER}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="Preview: PR #${PR_NUMBER}"

          DEPLOY_URL="https://pr-${PR_NUMBER}.takazudo-zudo-test-wisdom.pages.dev"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          DEPLOY_URL: ${{ steps.cf-deploy.outputs.deploy_url }}
        with:
          script: |
            const deployUrl = process.env.DEPLOY_URL;
            const prNumber = context.issue.number;
            const marker = '<!-- cf-preview-pr -->';

            const body = [
              marker,
              `## Cloudflare Pages Preview`,
              '',
              `Preview deployment is ready.`,
              '',
              `| | URL |`,
              `|---|---|`,
              `| Preview | ${deployUrl} |`,
              '',
              `Built from commit: \`${context.sha.substring(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing preview comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new preview comment');
            }
