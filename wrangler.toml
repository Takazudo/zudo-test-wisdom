# Cloudflare Workers Static Assets configuration

name = "zudo-test-wisdom"
main = "./dist/_worker.js"

compatibility_date = "2024-12-01"
# nodejs_compat is required by the CF adapter bundle at dist/_worker.js,
# which imports node:async_hooks (AsyncLocalStorage). Without this flag
# wrangler 4.x refuses to load the worker even when dist/_worker.js exists.
compatibility_flags = ["nodejs_compat"]

# Top-level fields (MUST stay above the [assets] table — in TOML any key after
# a table header is scoped into that table; if these sit under [assets] wrangler
# warns "Unexpected fields found in assets field" and silently ignores them).
#
# workers_dev enables the worker's PUBLIC *.workers.dev subdomain
# (zudo-test-wisdom.takazudo.workers.dev). It is REQUIRED for the
# preview-alias URLs below to actually route: with workers_dev disabled,
# Cloudflare still PRINTS the pr-<N> preview-alias URL at upload time, but the
# edge rejects requests to it with "error code: 1042" (the workers.dev hostname
# is private). Production is also served on the custom domain at the bottom of
# this file; enabling this additionally exposes the whole site on workers.dev
# (acceptable — the content is public; add a noindex/canonical pass later if SEO
# duplication matters). The matching live setting lives on the worker as the
# `enabled` subdomain flag, applied by `wrangler deploy`; a worker that has never
# had a production deploy must be bootstrapped once via the CF API
# (POST /accounts/<acct>/workers/scripts/<name>/subdomain {"enabled":true}).
workers_dev = true

# preview_urls enables *.workers.dev version-preview URLs for staging/preview
# deploys (consumed by main-deploy.yml / pr-checks.yml via
# `wrangler versions upload --preview-alias`). Requires workers_dev = true
# (above) to route. Maps to the worker's `previews_enabled` subdomain flag,
# likewise applied by `wrangler deploy` / bootstrapped via the same API call.
preview_urls = true

# ---------------------------------------------------------------------------
# Static asset serving
#
# not_found_handling = "404-page" serves dist/404.html for unmatched GETs.
#
# run_worker_first = false means the asset layer is consulted before the
# worker script; the worker only runs when no matching asset is found.
#
# .assetsignore mechanism: during deploy-prep a .assetsignore file is written
# into dist/ listing _worker.js and _zfb_inner.mjs so those files are excluded
# from the public asset directory and are not served as downloadable files.
# That file is generated by the deploy workflow — it is NOT committed to the repo.
# ---------------------------------------------------------------------------
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = false

# ---------------------------------------------------------------------------
# Custom domain routing
# route host MUST equal settings.siteUrl's host (src/config/settings.ts)
# ---------------------------------------------------------------------------
[[routes]]
pattern = "zudo-test-wisdom.takazudomodular.com"
custom_domain = true
